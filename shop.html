<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groove Galleria | Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0d0d0d;
      color: white;
      overflow-x: hidden;
    }

    nav {
      width: 100%;
      padding: 18px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      z-index: 1000;
      border-bottom: 1px solid #1f1f1f;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
      font-size: 0.95rem;
    }

    .nav-links a:hover {
      color: #c7a46c;
    }

    .shop-hero {
      height: 45vh;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1511499767150-a48a237f0083?q=80&w=1400&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .shop-hero h1 {
      font-size: 4rem;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .shop-hero p {
      color: #ddd;
      font-size: 1rem;
      max-width: 600px;
      line-height: 1.6;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      padding: 40px 20px 10px;
    }

    .filters button {
      padding: 10px 20px;
      border: 1px solid #333;
      background: #151515;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.9rem;
    }

    .filters button:hover,
    .filters button.active {
      background: #c7a46c;
      color: black;
    }

    .products {
      width: 92%;
      max-width: 1300px;
      margin: 50px auto 80px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .product {
      background: #141414;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #222;
      transition: 0.4s ease;
    }

    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }

    .product img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .product-info {
      padding: 18px;
    }

    .product-category {
      color: #c7a46c;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .product h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .product-price {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stock {
      color: #9c9c9c;
      font-size: 0.9rem;
      margin-bottom: 18px;
    }

    .order-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      border-radius: 14px;
      background: #c7a46c;
      color: black;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .order-btn:hover {
      background: white;
    }

    footer {
      padding: 40px 8%;
      border-top: 1px solid #222;
      text-align: center;
      color: #888;
    }

    @media (max-width: 768px) {
      .shop-hero h1 {
        font-size: 2.5rem;
      }

      nav {
        flex-direction: column;
        gap: 15px;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }

      .products {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      .product img {
        height: 190px;
      }

      .product-info {
        padding: 14px;
      }

      .product h3 {
        font-size: 0.92rem;
      }
    }

    @media (max-width: 480px) {
      .products {
        width: 94%;
      }

      .product img {
        height: 170px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">GROOVE GALLERIA</div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="#">Collections</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="shop-hero">
    <div>
      <h1>SHOP</h1>
      <p>
        Discover premium sunglasses and blue light glasses inspired by culture,
        fashion and everyday movement.
      </p>
    </div>
  </section>

  <section class="filters">
  <button class="active" onclick="filterProducts('all', this)">
    All
  </button>

  <button onclick="filterProducts('Men', this)">
    Men's
  </button>

  <button onclick="filterProducts('Women', this)">
    Women's
  </button>

  <button onclick="filterProducts('Unisex', this)">
    Unisex
  </button>
</section>

  <section class="products" id="products"></section>

  <footer>
    <p>© 2026 Groove Galleria. All rights reserved.</p>
  </footer>

  <script>
  let allProducts = [];

  fetch("https://sheetdb.io/api/v1/5rx85jjefrjui")
    .then(res => res.json())
    .then(products => {

      allProducts = products;
      displayProducts(products);

    })
    .catch(error => {
      console.error(error);
    });

  function displayProducts(products) {

    const container = document.getElementById("products");

    let html = "";

    products.forEach(product => {

      html += `
        <div class="product">
          <img src="${product.image || ''}" alt="${product.name}">

          <div class="product-info">

            <p class="product-category">
              ${product.gender || 'Eyewear'}
            </p>

            <h3>${product.name}</h3>

            <p class="product-price">
              R${product.price}
            </p>

            <p class="stock">
              ${product.stock} in stock
            </p>

            <a
              href="https://wa.me/27706686611?text=Hi%20Groove%20Galleria,%20I'm%20interested%20in%20${encodeURIComponent(product.name)}"
              target="_blank"
              class="order-btn"
            >
              Order on WhatsApp
            </a>

          </div>
        </div>
      `;
    });

    container.innerHTML = html;
  }

  function filterProducts(gender, button) {

    document.querySelectorAll(".filters button").forEach(btn => {
      btn.classList.remove("active");
    });

    button.classList.add("active");

    if (gender === "all") {
      displayProducts(allProducts);
      return;
    }

    const filtered = allProducts.filter(product =>
      product.gender &&
      product.gender.toLowerCase() === gender.toLowerCase()
    );

    displayProducts(filtered);
  }
  </script>

</body>
                        </html>
