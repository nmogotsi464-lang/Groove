<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Groove Galleria</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      color: white;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    nav {
      width: 100%;
      padding: 18px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #c7a46c;
    }

    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-image {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.8)
      );
    }

    .hero-content {
      position: relative;
      z-index: 10;
      max-width: 700px;
      padding: 20px;
    }

    .hero-tag {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      margin-bottom: 25px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
    }

    .hero-content h1 {
      font-size: 5rem;
      line-height: 0.95;
      margin-bottom: 20px;
      letter-spacing: 3px;
    }

    .hero-content p {
      color: #d1d1d1;
      line-height: 1.7;
      margin-bottom: 35px;
      font-size: 1rem;
    }

    .hero-btn {
      display: inline-block;
      padding: 15px 30px;
      background: #c7a46c;
      color: black;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 700;
      transition: 0.3s;
    }

    .hero-btn:hover {
      background: white;
      transform: translateY(-3px);
    }

    .scroll-down {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      letter-spacing: 3px;
      opacity: 0.7;
      z-index: 10;
    }

    .featured-section {
      width: 92%;
      max-width: 1300px;
      margin: 100px auto;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .section-header h2 {
      font-size: 2.2rem;
      letter-spacing: 2px;
    }

    .section-header p {
      color: #999;
      font-size: 0.95rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
    }

    .product {
      background: #141414;
      border: 1px solid #202020;
      border-radius: 24px;
      overflow: hidden;
      transition: 0.4s ease;
    }

    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.4);
    }

    .product img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .product-info {
      padding: 18px;
    }

    .product-category {
      color: #c7a46c;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .product h3 {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .product-price {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stock {
      color: #999;
      margin-bottom: 18px;
      font-size: 0.9rem;
    }

    .order-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      background: #c7a46c;
      color: black;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      transition: 0.3s;
    }

    .order-btn:hover {
      background: white;
    }

    footer {
      padding: 40px 8%;
      border-top: 1px solid #1f1f1f;
      text-align: center;
      color: #888;
    }

    .snow {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    .snow span {
      position: absolute;
      top: -10px;
      background: white;
      border-radius: 50%;
      animation: snow linear infinite;
    }

    @keyframes snow {
      to {
        transform: translateY(110vh);
      }
    }

    @media (max-width: 768px) {

      nav {
        flex-direction: column;
        gap: 15px;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero-content h1 {
        font-size: 3rem;
      }

      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      .product img {
        height: 180px;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

  </style>

</head>

<body>

  <nav>

    <div class="logo">
      GROOVE GALLERIA
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>

  </nav>

  <section class="hero">

    <img src="hero.jpg" alt="Groove Galleria" class="hero-image">

    <div class="overlay"></div>

    <div class="snow" id="snow"></div>

    <div class="hero-content">

      <span class="hero-tag">WINTER '26 DROP</span>

      <h1>GROOVE<br>GALLERIA</h1>

      <p>
        Premium sunglasses and blue light eyewear inspired by culture,
        music and modern street luxury.
      </p>

      <div class="hero-buttons">
        <a href="shop.html" class="hero-btn">VIEW CATALOG</a>
      </div>

    </div>

    <div class="scroll-down">SCROLL</div>

  </section>

  <section class="featured-section">

    <div class="section-header">
      <div>
        <h2>FEATURED</h2>
        <p>Selected eyewear from the latest collection.</p>
      </div>
    </div>

    <div class="products-grid" id="products"></div>

  </section>

  <footer>
    <p>© 2026 Groove Galleria</p>
  </footer>

  <script>

    const snowContainer = document.getElementById('snow');

    for (let i = 0; i < 120; i++) {

      let snowflake = document.createElement('span');

      snowflake.style.left = Math.random() * 100 + 'vw';
      snowflake.style.animationDuration = (Math.random() * 5 + 5) + 's';
      snowflake.style.opacity = Math.random();
      snowflake.style.width = snowflake.style.height = Math.random() * 4 + 2 + 'px';
      snowflake.style.animationDelay = Math.random() * 5 + 's';

      snowContainer.appendChild(snowflake);
    }

    fetch("https://sheetdb.io/api/v1/5rx85jjefrjui")
      .then(res => res.json())
      .then(products => {

        const container = document.getElementById("products");

        const featuredProducts = products.filter(product =>
          product.featured && product.featured.toLowerCase() === "yes"
        );

        let html = "";

        featuredProducts.forEach(product => {
          html += `
            <div class="product">

              <img src="${product.image || ''}" alt="${product.name}">

              <div class="product-info">

                <p class="product-category">
                  ${product.category || 'Eyewear'}
                </p>

                <h3>${product.name}</h3>

                <p class="product-price">
                  R${product.price}
                </p>

                <p class="stock">
                  ${product.stock} in stock
                </p>

                <a
                  href="https://wa.me/27706686611?text=Hi%20Groove%20Galleria,%20I'm%20interested%20in%20${encodeURIComponent(product.name)}"
                  target="_blank"
                  class="order-btn"
                >
                  Order on WhatsApp
                </a>

              </div>

            </div>
          `;
        });

        container.innerHTML = html;
      });

  </script>

</body>
        </html>
